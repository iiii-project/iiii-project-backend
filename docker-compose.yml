services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  sqlite_data:
  media_data:
