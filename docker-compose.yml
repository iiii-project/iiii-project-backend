services:
  llama:
    build: ./llamacpp
    restart: unless-stopped
    environment:
      LLAMA_HOST: 0.0.0.0
      LLAMA_PORT: 1234
      LLAMA_MODEL: ${LLAMA_MODEL:-}
      LLAMA_MODEL_ALIAS: ${LLAMA_MODEL_ALIAS:-local-model}
    ports:
      - "${LLAMA_HOST_PORT:-1234}:1234"
    volumes:
      - ./llamacpp:/llamacpp
    entrypoint:
      - /bin/sh
      - -c
      - >-
        cd /llamacpp/llamacpp-linux &&
        ln -sf libggml-base.so.0 libggml-base.so &&
        ln -sf libggml-base.so.0.15.3 libggml-base.so.0 &&
        ln -sf libggml.so.0 libggml.so &&
        ln -sf libggml.so.0.15.3 libggml.so.0 &&
        ln -sf libllama-common.so.0 libllama-common.so &&
        ln -sf libllama-common.so.0.0.9873 libllama-common.so.0 &&
        ln -sf libllama.so.0 libllama.so &&
        ln -sf libllama.so.0.0.9873 libllama.so.0 &&
        ln -sf libmtmd.so.0 libmtmd.so &&
        ln -sf libmtmd.so.0.0.9873 libmtmd.so.0 &&
        sed -i 's/\r$//' start-llama.sh &&
        exec bash start-llama.sh
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:1234/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-1234}
      LLM_BASE_URL: http://llama:1234/v1
      LLM_MODEL: ${LLAMA_MODEL_ALIAS:-local-model}
    depends_on:
      llama:
        condition: service_healthy
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  sqlite_data:
  media_data:
